<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob and Worm Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Blob and Worm Simulator</h1>
    </header>
    <main>
        <section id="blob-settings">
            <h2>Blob Settings</h2>
            <!-- Input fields for Blob parameters -->
            <label for="blob-size">Blob Size:</label>
            <input type="range" id="blob-size" min="1" max="100">
            <label for="blob-color">Blob Color:</label>
            <input type="color" id="blob-color" value="#ff0000">
            <button id="update-blob">Update Blob</button>
        </section>
        <section id="worm-lab">
            <h2>Worm Lab</h2>
            <!-- Controls for Worm interactions -->
            <button id="add-worm">Add Worm</button>
            <button id="clear-worms">Clear Worms</button>
        </section>
        <canvas id="simulation-canvas" width="800" height="600"></canvas>
    </main>
    <script src="simulator.js"></script>
</body>
</html>
